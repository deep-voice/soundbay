experiment:
  project: finding_willy
  name: audio_mnist_run
  debug: false
  artifacts_upload_limit: 64

model:
  module_name: ResNet1Channel
  num_classes: 10  # Typically 10 for MNIST, change this as needed
  criterion: cross_entropy
  model_params:
    layers: [3, 4, 6, 3]
    block: torchvision.models.resnet.Bottleneck

data:
  batch_size: 64
  num_workers: 10
  sample_rate: 8000
  data_sample_rate: 8000
  min_freq: 0
  n_fft: 256
  hop_length: 64
  seq_length: 0.139
  audio_representation: spectrogram
  
  train_dataset:
    module_name: ClassifierDataset
    data_path: PATH_TO_AUDIO_MNIST_DATA
    metadata_path: PATH/digit_annotation_train.csv
    mode: train
    augmentations_p: 0.8
    margin_ratio: 0.0
    slice_flag: false
    augmentations_config:
      pitch_shift_p: 0.0
      time_stretch_p: 0.5
      time_masking_p: 0.5
      frequency_masking_p: 0.5
      min_semitones: -4
      max_semitones: 4
      min_rate: 0.9
      max_rate: 1.1

  val_dataset:
    module_name: ClassifierDataset
    data_path: PATH_TO_AUDIO_MNIST_DATA
    metadata_path: PATH/digit_annotation_test.csv
    mode: val
    augmentations_p: 0.0
    margin_ratio: 0.0
    slice_flag: true

optim:
  epochs: 100
  freeze_layers_for_finetune: true
  optimizer:
    module_name: torch.optim.Adam
    params:
      lr: 0.0005
  scheduler:
    module_name: torch.optim.lr_scheduler.CosineAnnealingWarmRestarts
    params:
      T_0: 5
